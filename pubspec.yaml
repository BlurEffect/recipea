name: recipea
description: "A personal recipe collection app."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^2.6.1

  # Storage
  hive_flutter: ^1.1.0

  # Navigation
  go_router: ^14.6.2

  # Image handling
  image_picker: ^1.1.2
  path_provider: ^2.1.4
  path: ^1.9.0

  # Export / Import
  share_plus: ^10.0.3
  file_picker: ^8.1.2

  # Utilities
  uuid: ^4.5.1
  intl: ^0.19.0
  image: ^4.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
